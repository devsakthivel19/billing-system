name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check formatting
        run: >
          find apps config manage.py
          -path '*/migrations/*' -prune -o
          -path '*/__pycache__/*' -prune -o
          -name '*.py' -print |
          xargs -n1 black --check

      - name: Check imports
        run: isort --check-only apps config manage.py

      - name: Lint
        run: flake8 apps config manage.py

      - name: Run tests
        run: pytest
